name: AU Student Digest

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      preview:
        description: Render HTML previews instead of sending emails
        required: false
        type: boolean
        default: false
      recipient:
        description: Optional single student email to process
        required: false
        type: string
      limit:
        description: Optional max number of students to process
        required: false
        type: string

permissions:
  contents: read

jobs:
  send-student-digests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send AU student digests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_RELAY_TOKEN: ${{ secrets.DIGEST_RELAY_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STUDENT_ADMIN_TOKEN: ${{ secrets.STUDENT_ADMIN_TOKEN }}
          STUDENT_MANAGE_URL: ${{ vars.STUDENT_MANAGE_URL }}
          STUDENT_REGISTRY_URL: ${{ vars.STUDENT_REGISTRY_URL }}
          WORKFLOW_DISPATCH_PREVIEW: ${{ inputs.preview }}
          WORKFLOW_DISPATCH_RECIPIENT: ${{ inputs.recipient }}
          WORKFLOW_DISPATCH_LIMIT: ${{ inputs.limit }}
        run: |
          if [ -z "$STUDENT_ADMIN_TOKEN" ]; then
            echo "No STUDENT_ADMIN_TOKEN configured; skipping AU student digests."
            exit 0
          fi
          cmd=(python student_digest.py)
          if [ "$WORKFLOW_DISPATCH_PREVIEW" = "true" ]; then
            cmd+=(--preview --preview-dir student_previews)
          fi
          if [ -n "$WORKFLOW_DISPATCH_RECIPIENT" ]; then
            cmd+=(--recipient "$WORKFLOW_DISPATCH_RECIPIENT")
          fi
          if [ -n "$WORKFLOW_DISPATCH_LIMIT" ]; then
            cmd+=(--limit "$WORKFLOW_DISPATCH_LIMIT")
          fi
          "${cmd[@]}"

      - name: Upload preview artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.preview }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: student-previews
          path: student_previews/
