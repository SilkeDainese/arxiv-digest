name: arXiv Digest

on:
  schedule:
    - cron: '0 7 * * 1,3,5'  # Mon/Wed/Fri at 07:00 UTC (9am Danish time)
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # required for Workload Identity Federation

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Stagger scheduled runs
        if: github.event_name == 'schedule'
        run: |
          DELAY=$((RANDOM % 900))
          echo "Waiting ${DELAY}s to spread API load across forks..."
          sleep $DELAY

      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f  # v2.1.7
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check config
        run: |
          if [ ! -f config.yaml ]; then
            echo "config.yaml is missing. Upload your generated config.yaml to the repo before running the digest."
            exit 1
          fi
          CONFIG_RECIPIENT=$(python -c "import yaml; c=yaml.safe_load(open('config.yaml')); print((c.get('recipient_email') or '').strip())" 2>/dev/null || echo "")
          if [ -z "$RECIPIENT_EMAIL" ] && [ -z "$CONFIG_RECIPIENT" ]; then
            echo "No recipient email found. Set recipient_email in config.yaml (the setup wizard does this for you)."
            exit 1
          fi
          echo "recipient_email configured"
          # Delivery requires either direct SMTP credentials or an explicit relay token.
          SMTP_U="${SMTP_USER:-$GMAIL_USER}"
          SMTP_P="${SMTP_PASSWORD:-$GMAIL_APP_PASSWORD}"
          if [ -n "$SMTP_U" ] && [ -n "$SMTP_P" ]; then
            echo "SMTP credentials found — sending directly"
          elif [ -n "$DIGEST_RELAY_TOKEN" ]; then
            echo "Relay token found — sending through shared relay"
          else
            echo "No email delivery method configured."
            echo "   Add DIGEST_RELAY_TOKEN for relay delivery, or SMTP_USER and SMTP_PASSWORD to send directly."
            exit 1
          fi
          # ANTHROPIC_API_KEY is optional — used as fallback AI provider if present
          if [ -n "$ANTHROPIC_API_KEY" ]; then echo "Claude API key found (optional fallback)"; fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then echo "No AI key configured — using keyword fallback (this is fine)"; fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional fallback
          DIGEST_RELAY_TOKEN: ${{ secrets.DIGEST_RELAY_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # optional fallback
          DIGEST_RELAY_TOKEN: ${{ secrets.DIGEST_RELAY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GCP_PROJECT: ${{ vars.GCP_PROJECT || 'silke-hub' }}
        run: python digest.py

      - name: Commit keyword stats
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase || true
          [ -f keyword_stats.json ] && git add keyword_stats.json || true
          [ -f feedback_stats.json ] && git add feedback_stats.json || true
          git diff --cached --quiet || git commit -m "Update digest stats [skip ci]"
          git push || echo "Could not push stats (workflow permissions may not be enabled). This is optional — your digest still works fine."

      - name: Upload digest as artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: digest-html
          path: |
            digest_output.html
            keyword_stats.json
            feedback_stats.json
          if-no-files-found: ignore

      - name: Write run summary
        if: always()
        run: |
          PAPER_COUNT=$(python -c "
          import json, pathlib
          stats = pathlib.Path('keyword_stats.json')
          if stats.exists():
              data = json.loads(stats.read_text())
              print(sum(1 for v in data.values() if v.get('last_hit','')))
          else:
              print('?')
          " 2>/dev/null || echo "?")
          echo "### Digest Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Papers with keyword hits: $PAPER_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: digest" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Report failure
        if: failure()
        continue-on-error: true
        run: |
          if [ -n "$DIGEST_RELAY_URL" ]; then
            curl -s -X POST "${DIGEST_RELAY_URL}/api/report" \
              -H "Content-Type: application/json" \
              -d '{
                "repo": "${{ github.repository }}",
                "run_id": "${{ github.run_id }}",
                "error": "Workflow failed — check logs",
                "workflow": "digest",
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }'
          fi
        env:
          DIGEST_RELAY_URL: ${{ vars.DIGEST_RELAY_URL }}
